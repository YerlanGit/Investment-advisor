<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BASE Risk Report — Premium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Manrope', 'system-ui', 'sans-serif'],
          mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
        },
        colors: {
          cream: { 50:'#fbf8f1', 100:'#f6f3ea', 200:'#efe9d8' },
          ink:   { 950:'#100f0e', 900:'#1c1b1a', 800:'#2a2825', 700:'#3a3833', 500:'#6b6862', 400:'#9a958c', 300:'#c4bfb5', 200:'#e2ddd1' },
          gold:  { 300:'#fbe48a', 400:'#f5d04e', 500:'#eac233', 600:'#caa01a', 700:'#9a7a10' },
          sage:  { 500:'#7a9a78', 600:'#5d7c5c' },
          rust:  { 500:'#c47358', 600:'#a85a40' },
        },
        borderRadius: { '4xl':'32px', '5xl':'40px' },
        boxShadow: {
          'card':  '0 1px 0 rgba(255,255,255,0.7) inset, 0 24px 48px -28px rgba(60,50,30,0.18), 0 1px 2px rgba(60,50,30,0.05)',
          'card-lg':'0 1px 0 rgba(255,255,255,0.7) inset, 0 36px 72px -36px rgba(60,50,30,0.28), 0 1px 2px rgba(60,50,30,0.06)',
          'dark':  '0 1px 0 rgba(255,255,255,0.06) inset, 0 24px 48px -24px rgba(0,0,0,0.45)',
        }
      }
    }
  }
</script>
<style>
  :root {
    --cream-50:#fbf8f1; --cream-100:#f6f3ea; --gold-400:#f5d04e;
    --ink-900:#1c1b1a; --ink-500:#6b6862;
  }
  html { scroll-behavior: smooth; scroll-padding-top: 96px; }
  body {
    background:
      radial-gradient(1100px 700px at 100% -10%, rgba(245,208,78,0.42), transparent 55%),
      radial-gradient(900px 700px at -10% 110%, rgba(231,219,191,0.55), transparent 55%),
      radial-gradient(700px 500px at 50% 50%, rgba(255,255,255,0.4), transparent 70%),
      linear-gradient(135deg, #f6f3ea 0%, #f9eed1 100%);
    background-attachment: fixed;
    color: var(--ink-900);
    font-family: 'Manrope', system-ui, sans-serif;
  }
  .glass     { background: rgba(255,255,255,0.62); backdrop-filter: blur(20px) saturate(140%); -webkit-backdrop-filter: blur(20px) saturate(140%); }
  .glass-strong { background: rgba(255,255,255,0.82); backdrop-filter: blur(24px) saturate(160%); -webkit-backdrop-filter: blur(24px) saturate(160%); }
  .glass-dark { background: rgba(28,27,26,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
  .num { font-feature-settings: 'tnum' 1, 'ss01' 1; font-variant-numeric: tabular-nums; }
  ::selection { background: #f5d04e; color: #1c1b1a; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(60,50,30,0.15); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(60,50,30,0.28); }

  /* hover lift on cards marked with .lift */
  .lift { transition: transform .35s cubic-bezier(.2,.7,.2,1), box-shadow .35s ease; }
  .lift:hover { transform: translateY(-2px); }

  /* dashed gauge track */
  .dashed-track { stroke-dasharray: 2 6; }

  /* skeleton shimmer (unused after load) */
  @keyframes shimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }

  /* fade-in on mount */
  @keyframes rise { from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:none} }
  .rise { animation: rise .6s cubic-bezier(.2,.7,.2,1) both; }

  /* faint hatch fill for "rest" pill in KPI strip (echoes reference) */
  .hatch {
    background-image: repeating-linear-gradient(110deg, rgba(28,27,26,0.10) 0 1px, transparent 1px 7px);
  }

  /* prevent layout flash before React mounts */
  .preload { opacity: 0; }
</style>
</head>
<body class="antialiased">
  <div id="root" class="preload"></div>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Component scripts -->
  <script type="text/babel" src="portfolio-data.jsx"></script>
  <script type="text/babel" src="portfolio-icons.jsx"></script>
  <script type="text/babel" src="portfolio-charts.jsx"></script>
  <script type="text/babel" src="portfolio-overview.jsx"></script>
  <script type="text/babel" src="portfolio-holdings.jsx"></script>
  <script type="text/babel" src="portfolio-performance.jsx"></script>
  <script type="text/babel" src="portfolio-ideas.jsx"></script>
  <script type="text/babel" src="portfolio-app.jsx"></script>
</body>
</html>
