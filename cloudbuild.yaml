# ────────────────────────────────────────────────────────────────────────────
# Google Cloud Build — RAMP Bot CI/CD pipeline
#
# Triggered automatically on every git push (configure trigger in GCP Console
# or via: gcloud beta builds triggers create github ...)
#
# One-shot manual run:
#   gcloud builds submit --config cloudbuild.yaml --project YOUR_PROJECT_ID .
#
# Substitution variables (override via --substitutions flag or Build Trigger UI):
#   _REGION   — GCP region for Artifact Registry + Cloud Run
#   _REPO     — Artifact Registry repository name
#   _SERVICE  — Cloud Run service name
# ────────────────────────────────────────────────────────────────────────────

substitutions:
  _REGION:   us-central1
  _REPO:     ramp
  _SERVICE:  ramp-bot
  # GCS bucket that backs the gcsfuse-mounted state volume (free tier:
  # SQLite is <1 MB, well under the 5 GB Standard-storage free allowance
  # in us-central1).  Create once before first deploy:
  #   gcloud storage buckets create gs://ramp-bot-state \
  #     --location=us-central1 --uniform-bucket-level-access
  _STATE_BUCKET: ramp-bot-state

steps:
  # ── Step 1: Build Docker image ──────────────────────────────────────────────
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA
      - --tag=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest
      - --cache-from=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest
      - .

  # ── Step 2: TEST GATE — run unittest discover INSIDE the just-built image ──
  # Hard prerequisite for push + deploy.  Any failed assertion fails the
  # build and the deploy step (which waits for [push, test]) never runs.
  # Network-isolated: the suite mocks FRED / Anthropic / Tradernet — no
  # live calls leave the builder.
  - id: test
    name: gcr.io/cloud-builders/docker
    waitFor: [build]
    args:
      - run
      - --rm
      - -e
      - PYTHONPATH=/app/src
      - --entrypoint=python
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA
      - -m
      - unittest
      - discover
      - -s
      - /app/tests
      # Only the hermetic, network-free engine suite (test_phase*.py).  The
      # broker-integration tests (test_freedom_*.py) depend on pytest +
      # live credentials and are intentionally excluded from the deploy gate.
      - -p
      - "test_phase*.py"

  # ── Step 3: Push both tags (only when tests are green) ─────────────────────
  - id: push
    name: gcr.io/cloud-builders/docker
    waitFor: [test]
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}

  # ── Step 4: Deploy to Cloud Run (only when push + test succeeded) ──────────
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    waitFor: [push, test]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --min-instances=1        # keep bot alive between polls
      - --max-instances=1        # single instance — SQLite is not multi-writer safe
      - --memory=2Gi             # pandas + sklearn need headroom
      - --cpu=1
      - --timeout=3600           # max request timeout (health probe)
      - --concurrency=1
      - --no-cpu-throttling        # CRITICAL: bot uses long-polling, not incoming HTTP
      - --no-allow-unauthenticated
      # PERSISTENT STATE — gcsfuse-mounted Cloud Storage bucket survives
      # every redeploy / scale-to-zero / cold-start.  Free-tier safe.
      # The runtime SA needs roles/storage.objectAdmin on _STATE_BUCKET.
      - --add-volume=name=state,type=cloud-storage,bucket=${_STATE_BUCKET}
      - --add-volume-mount=volume=state,mount-path=/mnt/state
      # Secrets injected from Secret Manager — values never touch image layers
      - --set-secrets=RAMP_BOT_TOKEN=RAMP_BOT_TOKEN:latest,FINTECH_MASTER_KEY=FINTECH_MASTER_KEY:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,FREEDOM_API_KEY=FREEDOM_API_KEY:latest,FREEDOM_API_SECRET=FREEDOM_API_SECRET:latest,FRED_API_KEY=FRED_API_KEY:latest
      # Plain env vars — non-sensitive configuration.
      # TOKENOMICS_DB_PATH points the async SQLite layer at the persistent
      # gcsfuse volume — without this every redeploy wipes user balances.
      # REPORTING_CURRENCY=USD pins H2 base-currency to USD for the beta
      # cohort; FX-conversion auto-no-ops on USD-only portfolios.
      # VAULT_DB_PATH points the SecureVault (Fernet-encrypted broker
      # credentials) at the SAME persistent gcsfuse volume so users do NOT
      # have to re-onboard after every redeploy (B1).
      # ADMIN_USER_IDS — Telegram IDs allowed to /grant test tokens.
      # 148046720 is the owner's account; add more comma-separated as needed.
      #
      # PREMIUM_REPORT_ENABLED=true — ROOT-CAUSE FIX (2026-06-27): the Premium V2
      # React report is gated by this flag (html_renderer reads it at import).
      # `gcloud run deploy --set-env-vars` REPLACES the ENTIRE env-var set on
      # every deploy, so a value set by hand in the console was WIPED back to
      # unset (→ "false") on the next CI deploy — which is why production kept
      # serving the v3 Jinja report even though the flag "was on".  Pinning it
      # here makes the premium routing persistent across every redeploy.  The
      # render path still falls back to v3 on any premium error (see
      # html_renderer.render_report_html), so this is safe to ship.
      - --set-env-vars=REPORT_BUCKET_NAME=ramp-bot-reports,CHROMA_BUCKET=ramp-bot-chroma-db-investadv,TOKENOMICS_DB_PATH=/mnt/state/tokenomics.db,VAULT_DB_PATH=/mnt/state/users_vault.db,REPORTING_CURRENCY=USD,ADMIN_USER_IDS=148046720,PREMIUM_REPORT_ENABLED=true

  # ── Step 5: Deploy the RAG-ingest Cloud Function (M3) ──────────────────────
  # Listens to the DEDICATED, write-controlled ingest bucket (NOT the reports
  # bucket — M2 fix) and re-indexes uploaded bank PDFs into ChromaDB.
  # Entry point is `on_pdf_uploaded` (the actual handler in
  # cloud_function/main.py); FINTECH_MASTER_KEY is intentionally NOT passed
  # (the function never touches the user vault — L6).
  #
  # FAIL-SOFT: this step does NOT block the main bot deploy.  Cloud Build SA
  # needs `roles/cloudfunctions.developer` (or `.admin`) on the project to
  # deploy/update functions; until that's granted, the step logs a warning
  # and exits 0 so the bot itself ships.  Grant once with:
  #   PROJECT_NUMBER=$(gcloud projects describe $PROJECT_ID --format='value(projectNumber)')
  #   gcloud projects add-iam-policy-binding $PROJECT_ID \
  #     --member="serviceAccount:${PROJECT_NUMBER}@cloudbuild.gserviceaccount.com" \
  #     --role="roles/cloudfunctions.developer"
  #   gcloud projects add-iam-policy-binding $PROJECT_ID \
  #     --member="serviceAccount:${PROJECT_NUMBER}@cloudbuild.gserviceaccount.com" \
  #     --role="roles/iam.serviceAccountUser"
  - id: deploy-rag-function
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    waitFor: [deploy]
    entrypoint: bash
    args:
      - -c
      - |
        gcloud functions deploy ramp-bot-rag-ingest \
          --gen2 \
          --runtime python312 \
          --region ${_REGION} \
          --source ./cloud_function \
          --entry-point on_pdf_uploaded \
          --trigger-event-filters="type=google.cloud.storage.object.v1.finalized" \
          --trigger-event-filters="bucket=ramp-bot-chroma-db-inbox-investadv" \
          --set-env-vars CHROMA_BUCKET=ramp-bot-chroma-db-investadv \
          --memory 1Gi \
          --timeout 300s \
          --max-instances 1 \
          --concurrency 1 \
          --quiet \
          || echo "WARN: Cloud Function deploy skipped (likely 403). Grant the Cloud Build SA roles/cloudfunctions.developer + roles/iam.serviceAccountUser to enable. Main bot deploy is unaffected."
        exit 0

# Images promoted to Artifact Registry after a successful build
images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_MEDIUM   # faster builds for dependency compilation

timeout: 1200s  # 20 min build timeout — pip install sklearn is slow
